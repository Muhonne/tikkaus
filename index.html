  * { box-sizing: border-box; margin: 0; padding: 0; }

  }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0.3rem;
    margin: 0.4rem 0 0.5rem;
  }
  .tab {
    padding: 0.35rem 0.9rem;
    border: 1.5px solid #f5a623;
    background: transparent;
    color: #f5a623;
    border-radius: 1rem;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  .tab:hover { background: rgba(245, 166, 35, 0.15); }
  .tab.active { background: #f5a623; color: #1a1a2e; }
  .list-section { display: none; }
  .list-section.active { display: block; }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.3rem;
    margin: 0 0 0.5rem;
  }
  .search-input {
    grid-column: 1 / -1;
    padding: 0.4rem 0.6rem;
    border: 1px solid #333;
    border-radius: 6px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 0.8rem;
    outline: none;
  }
  .search-input:focus { border-color: #f5a623; }
  .search-input::placeholder { color: #555; }
  .control-select {
    padding: 0.35rem 0.4rem;
    border: 1px solid #333;
    border-radius: 6px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 0.75rem;
    outline: none;
    cursor: pointer;
    min-width: 0;
  }
  .control-select:focus { border-color: #f5a623; }
  .progress-bar {
    text-align: center;
    margin-bottom: 0.4rem;
    font-size: 0.8rem;
    color: #aaa;
  }
  .progress-bar span { color: #f5a623; font-weight: 600; }
  .no-results {
    text-align: center;
    padding: 1.5rem;
    color: #666;
    font-style: italic;
    font-size: 0.85rem;
  }
  .brewery-section {
    margin-bottom: 0.5rem;
    background: #16213e;
    border-radius: 8px;
    overflow: hidden;
  }
  .brewery-header {
    background: #0f3460;
    padding: 0.35rem 0.6rem;
    font-size: 0.8rem;
    font-weight: 700;
    color: #f5a623;
    letter-spacing: 0.03em;
  }
  .beer-card {
    padding: 0.4rem 0.5rem;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .beer-card.done { opacity: 0.4; }
  .beer-card.done .beer-name { text-decoration: line-through; }
  .beer-checkbox {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    accent-color: #f5a623;
    cursor: pointer;
  }
  .beer-info { flex: 1; min-width: 0; }
  .beer-row {
    display: flex;
    align-items: baseline;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  .beer-name {
    font-weight: 600;
    font-size: 0.85rem;
    color: #fff;
  }
  .beer-detail {
    font-size: 0.7rem;
    color: #888;
  }
  .beer-abv {
    font-size: 0.7rem;
    color: #f5a623;
    font-weight: 600;
  }
  .beer-rating {
    font-size: 0.7rem;
    color: #ffc107;
    font-weight: 600;
  }
  .untappd-link {
    font-size: 0.65rem;
    color: #5a9ab8;
    text-decoration: none;
    margin-left: auto;
    flex-shrink: 0;
    padding: 0.15rem 0.3rem;
    border: 1px solid #2a4a60;
    border-radius: 4px;
  }
  .untappd-link:hover { border-color: #5a9ab8; }
  .no-rating {
    font-size: 0.65rem;
    color: #555;
  }
  .clear-btn {
    padding: 0.35rem 0.4rem;
    border: 1px solid #444;
    border-radius: 6px;
    background: transparent;
    color: #888;
    font-size: 0.75rem;
    cursor: pointer;
    text-align: center;
  }
  .clear-btn:not(:disabled) { color: #fff; border-color: #666; }
  .clear-btn:hover:not(:disabled) { border-color: #999; }
  .clear-btn:disabled { opacity: 0.3; cursor: default; }
</style>

      { name: "Something Unfamiliar", style: "Wild Ale", abv: "8.7%", untappd: "/b/cloudwater-brew-co-something-unfamiliar/6512875", rating: 3.90 },
      { name: "11th Birthday Supercharged IPA", style: "NEIPA", abv: "6%", untappd: "/b/cloudwater-brew-co-11th-birthday-supercharged-ipa/6584102", rating: 3.92 }
    ]},
    { brewery: "LEFT HANDED GIANT", beers: []}
  ]
};

// --- State helpers ---
function getChecked() {
  try { return JSON.parse(localStorage.getItem('tikkaus-checked') || '{}'); }
  catch { return {}; }
}
function saveChecked(data) {
  localStorage.setItem('tikkaus-checked', JSON.stringify(data));
}
function getUIState() {
  try { return JSON.parse(localStorage.getItem('tikkaus-ui') || '{}'); }
  catch { return {}; }
}
function saveUIState(patch) {
  const cur = getUIState();
  Object.assign(cur, patch);
  localStorage.setItem('tikkaus-ui', JSON.stringify(cur));
}

function beerId(list, brewery, beerName) {
  return `${list}::${brewery}::${beerName}`;
}

function parseAbv(abv) {
  return parseFloat(abv) || 0;
}

// --- Collect all unique styles for the filter dropdown ---
function getAllStyles() {
  const styles = new Set();
  for (const groups of Object.values(BEER_DATA)) {
    for (const g of groups) {
      for (const b of g.beers) {
        styles.add(b.style);
      }
    }
  }
  return [...styles].sort();
}

function populateStyleFilter() {
  const sel = document.getElementById('style-filter');
  const current = sel.value;
  const styles = getAllStyles();
  sel.innerHTML = '<option value="">All styles</option>';
  for (const s of styles) {
    sel.innerHTML += `<option value="${s}" ${s === current ? 'selected' : ''}>${s}</option>`;
  }
}

// --- Rendering ---
function getActiveList() {
  const active = document.querySelector('.tab.active');
  return active ? active.dataset.list : 'friday';
}

function flattenList(listKey) {
  const groups = BEER_DATA[listKey];
  const result = [];
  for (const g of groups) {
    for (const beer of g.beers) {
      result.push({ ...beer, brewery: g.brewery, _id: beerId(listKey, g.brewery, beer.name) });
    }
  }
  return result;
}

function applyFilters(beers) {
  const checked = getChecked();
  const search = document.getElementById('search').value.toLowerCase().trim();
  const styleFilter = document.getElementById('style-filter').value;
  const statusFilter = document.getElementById('status-filter').value;
  const sortBy = document.getElementById('sort-by').value;

  let filtered = beers;

  if (search) {
    filtered = filtered.filter(b =>
      b.name.toLowerCase().includes(search) ||
      b.brewery.toLowerCase().includes(search) ||
      b.style.toLowerCase().includes(search)
    );
  }
  if (styleFilter) {
    filtered = filtered.filter(b => b.style === styleFilter);
  }
  if (statusFilter === 'done') {
    filtered = filtered.filter(b => checked[b._id]);
  } else if (statusFilter === 'todo') {
    filtered = filtered.filter(b => !checked[b._id]);
  }

  if (sortBy === 'rating-desc') {
    filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  } else if (sortBy === 'rating-asc') {
    filtered.sort((a, b) => (a.rating || 0) - (b.rating || 0));
  } else if (sortBy === 'abv-desc') {
    filtered.sort((a, b) => parseAbv(b.abv) - parseAbv(a.abv));
  } else if (sortBy === 'abv-asc') {
    filtered.sort((a, b) => parseAbv(a.abv) - parseAbv(b.abv));
  } else if (sortBy === 'name-asc') {
    filtered.sort((a, b) => a.name.localeCompare(b.name));
  }
  // 'default' keeps original brewery order

  return filtered;
}

function renderList(listKey) {
  const checked = getChecked();
  const allBeers = flattenList(listKey);
  const filtered = applyFilters(allBeers);
  const sortBy = document.getElementById('sort-by').value;

  const totalBeers = allBeers.length;
  const doneBeers = allBeers.filter(b => checked[b._id]).length;

  let html = `<div class="progress-bar">Progress: <span>${doneBeers}</span> / <span>${totalBeers}</span></div>`;

  if (filtered.length === 0) {
    html += `<div class="no-results">No beers match your filters</div>`;
    return html;
  }

  if (sortBy === 'default') {
    // Group by brewery in original order
    const seen = new Set();
    const orderedBreweries = [];
    for (const b of filtered) {
      if (!seen.has(b.brewery)) {
        seen.add(b.brewery);
        orderedBreweries.push(b.brewery);
      }
    }
    for (const brewery of orderedBreweries) {
      const group = filtered.filter(b => b.brewery === brewery);
      html += `<div class="brewery-section">`;
      html += `<div class="brewery-header">${brewery}</div>`;
      for (const beer of group) {
        html += renderBeerCard(beer, checked);
      }
      html += `</div>`;
    }
  } else {
    // Flat sorted list, still show brewery headers when brewery changes
    let lastBrewery = null;
    html += `<div class="brewery-section">`;
    for (const beer of filtered) {
      if (beer.brewery !== lastBrewery) {
        if (lastBrewery !== null) html += `</div><div class="brewery-section">`;
        html += `<div class="brewery-header">${beer.brewery}</div>`;
        lastBrewery = beer.brewery;
      }
      html += renderBeerCard(beer, checked);
    }
    html += `</div>`;
  }

  return html;
}

function renderBeerCard(beer, checked) {
  const isDone = !!checked[beer._id];
  const untappdUrl = beer.untappd ? `https://untappd.com${beer.untappd}` : null;
  const ratingHtml = beer.rating
    ? `<span class="beer-rating">★${beer.rating.toFixed(1)}</span>`
    : `<span class="no-rating">—</span>`;
  return `
    <div class="beer-card ${isDone ? 'done' : ''}" data-id="${beer._id}">
      <input type="checkbox" class="beer-checkbox" ${isDone ? 'checked' : ''} data-id="${beer._id}">
      <div class="beer-info">
        <div class="beer-row">
          <span class="beer-name">${beer.name}</span>
          <span class="beer-detail">${beer.style}</span>
          <span class="beer-abv">${beer.abv}</span>
          ${ratingHtml}
        </div>
      </div>
      ${untappdUrl ? `<a href="${untappdUrl}" target="_blank" rel="noopener" class="untappd-link">UT</a>` : ''}
    </div>`;
}

function renderAll() {
  const app = document.getElementById('app');
  const listKey = getActiveList();
  let html = `<div class="list-section active" data-section="${listKey}">`;
  html += renderList(listKey);
  html += `</div>`;
  app.innerHTML = html;
}

// --- Events ---
document.addEventListener('change', (e) => {
  if (e.target.classList.contains('beer-checkbox')) {
    const id = e.target.dataset.id;
    const checked = getChecked();
    if (e.target.checked) {
      checked[id] = true;
    } else {
      delete checked[id];
    }
    saveChecked(checked);
    renderAll();
  }
});

document.querySelector('.tabs').addEventListener('click', (e) => {
  if (e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    saveUIState({ list: e.target.dataset.list });
    renderAll();
  }
});

function hasActiveFilters() {
  return document.getElementById('search').value ||
    document.getElementById('style-filter').value ||
    document.getElementById('status-filter').value ||
    document.getElementById('sort-by').value !== 'default';
}
function updateClearBtn() {
  document.getElementById('clear-filters').disabled = !hasActiveFilters();
}

document.getElementById('search').addEventListener('input', (e) => {
  saveUIState({ search: e.target.value });
  renderAll(); updateClearBtn();
});
document.getElementById('style-filter').addEventListener('change', (e) => {
  saveUIState({ style: e.target.value });
  renderAll(); updateClearBtn();
});
document.getElementById('status-filter').addEventListener('change', (e) => {
  saveUIState({ status: e.target.value });
  renderAll(); updateClearBtn();
});
document.getElementById('sort-by').addEventListener('change', (e) => {
  saveUIState({ sort: e.target.value });
  renderAll(); updateClearBtn();
});
document.getElementById('clear-filters').addEventListener('click', () => {
  document.getElementById('search').value = '';
  document.getElementById('style-filter').value = '';
  document.getElementById('status-filter').value = '';
  document.getElementById('sort-by').value = 'default';
  saveUIState({ search: '', style: '', status: '', sort: 'default' });
  renderAll(); updateClearBtn();
});

// --- Init: restore persisted UI state ---
(function init() {
  const ui = getUIState();

  // Restore active tab
  const listKey = ui.list || 'friday';
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.list === listKey);
  });

  // Restore filter controls
  if (ui.search) document.getElementById('search').value = ui.search;
  if (ui.status) document.getElementById('status-filter').value = ui.status;
  if (ui.sort) document.getElementById('sort-by').value = ui.sort;

  populateStyleFilter();
  if (ui.style) document.getElementById('style-filter').value = ui.style;

  renderAll();
  updateClearBtn();
})();
</script>
</body>
</html>
